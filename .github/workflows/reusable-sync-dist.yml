name: Reusable Sync Dist

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version for build.
        required: false
        default: "20"
        type: string
      build_command:
        description: Build command that generates dist artifacts.
        required: false
        default: "npm run build"
        type: string
      dist_path:
        description: Path to built artifacts that should be committed.
        required: false
        default: "dist"
        type: string
      commit_message:
        description: Commit message for generated artifact update.
        required: false
        default: "ci: refresh dist artifacts"
        type: string

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Build dist
        run: |
          set -euo pipefail
          npm ci
          ${{ inputs.build_command }}

      - name: Check dist changes
        id: diff
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain -- '${{ inputs.dist_path }}')" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push dist
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.dist_path }}"
          git commit -m "${{ inputs.commit_message }}"
          git push
