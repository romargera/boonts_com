name: Sync Dist

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".github/workflows/sync-dist.yml"
      - ".github/workflows/reusable-sync-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dist-main
  cancel-in-progress: true

jobs:
  build-and-sync:
    uses: ./.github/workflows/reusable-sync-dist.yml
    with:
      node_version: "20"
      build_command: "npm run build"
      dist_path: "dist"
      commit_message: "ci: refresh dist artifacts"
