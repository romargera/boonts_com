name: Sync Dist

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".github/workflows/sync-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dist-main
  cancel-in-progress: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build dist
        run: |
          npm ci
          npm run build

      - name: Check dist changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push dist
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "ci: refresh dist artifacts"
          git push

