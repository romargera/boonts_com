name: Deploy To Coolify

on:
  push:
    branches:
      - main
    paths:
      - "dist/**"
      - ".github/workflows/deploy-coolify.yml"
      - ".github/workflows/reusable-deploy-coolify.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coolify-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy-coolify.yml
    with:
      poll_attempts: 60
      poll_interval_seconds: 10
      force_redeploy: true
    secrets:
      COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.MAC_ROMAN_DEPLOY }}
      COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
